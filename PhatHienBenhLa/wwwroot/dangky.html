<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Hệ thống Nhận diện Bệnh Lá</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2e7d32;
            --primary-hover: #1b5e20;
            --bg-body: #f0f7f4;
            --bg-input: #eef4f8;
            --border-input: #d1dfdf;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .auth-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

            .auth-header h2 {
                color: var(--primary);
                margin: 0;
                font-size: 28px;
                font-weight: bold;
            }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .form-group {
            flex: 1;
            position: relative;
        }

            .form-group.full-width {
                width: 100%;
                margin-bottom: 15px;
            }

            .form-group label {
                display: block;
                font-size: 13px;
                font-weight: bold;
                margin-bottom: 6px;
                color: #555;
            }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-input);
            border-radius: 6px;
            background-color: var(--bg-input);
            box-sizing: border-box;
            font-size: 14px;
            color: var(--text-dark);
            transition: all 0.3s;
        }

            .form-control:focus {
                outline: none;
                border-color: var(--primary);
                background-color: #fff;
                box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
            }

        /* Khu vực hiển thị riêng cho Chuyên gia */
        #khuVucChuyenGia {
            display: none;
            background: #f1f8e9;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px dashed var(--primary);
            margin-bottom: 20px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

            .btn-submit:hover {
                background-color: var(--primary-hover);
            }

        .auth-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

            .auth-links a {
                color: var(--primary);
                text-decoration: none;
                font-weight: bold;
            }

        /* Mắt xem mật khẩu */
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 32px;
            color: #888;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <h2>Tạo Tài Khoản Mới</h2>
        </div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" id="hoTen" class="form-control" placeholder="Nguyễn Văn A" required>
                </div>
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="tenDangNhap" class="form-control" placeholder="Tên viết liền không dấu" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="text" id="soDienThoai" class="form-control" placeholder="09xxxxxxx" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" placeholder="email@gmail.com" required>
                </div>
            </div>

            <div class="form-group full-width">
                <label>Địa chỉ</label>
                <input type="text" id="diaChi" class="form-control" placeholder="Số nhà, Đường, Quận/Huyện, Tỉnh/Thành" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="matKhau" class="form-control" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('matKhau', this)"></i>
                </div>
                <div class="form-group">
                    <label>Nhập lại mật khẩu</label>
                    <input type="password" id="nhapLaiMatKhau" class="form-control" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('nhapLaiMatKhau', this)"></i>
                </div>
            </div>

            <div class="form-group full-width">
                <label>Bạn là ai?</label>
                <select class="form-control" id="vaiTro" onchange="kiemTraVaiTro()" style="background-color: white;">
                    <option value="NongDan">Nông dân / Nhà vườn</option>
                    <option value="ChuyenGia">Chuyên gia Nông nghiệp</option>
                </select>
            </div>

            <div id="khuVucChuyenGia">
                <p style="color: #2e7d32; font-size: 13px; font-weight: bold; margin-top: 0; margin-bottom: 10px;">* Thông tin chuyên môn (Dành cho chuyên gia)</p>

                <div class="form-row" style="margin-bottom: 12px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label style="color: #555;">Chuyên ngành tư vấn (*)</label>
                        <input type="text" id="chuyenNganh" class="form-control" style="background: white;" placeholder="VD: Bệnh lý thực vật">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label style="color: #555;">Đơn vị công tác (*)</label>
                        <input type="text" id="coQuan" class="form-control" style="background: white;" placeholder="VD: Viện Nông Nghiệp">
                    </div>
                </div>

                <div>
                    <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555;"><i class="fas fa-camera"></i> Tải ảnh bằng cấp / Giấy tờ chứng minh (*)</label>
                    <input type="file" id="fileBangCap" accept="image/*" onchange="chuyenAnhSangBase64(this)" style="width: 100%; padding: 7px; background-color: white; border: 1px solid #d1dfdf; border-radius: 6px; box-sizing: border-box;">
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">Đăng ký ngay</button>

            <div class="auth-links">
                Đã có tài khoản? <a href="/dangnhap.html">Đăng nhập ngay</a>
            </div>
        </form>
    </div>

    <script>
        let anhBangCapBase64 = "";

        // Hàm bật tắt xem mật khẩu
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Hàm kiểm tra ẩn/hiện khu vực chuyên gia
        function kiemTraVaiTro() {
            const vaiTro = document.getElementById('vaiTro').value;
            const khuVuc = document.getElementById('khuVucChuyenGia');
            if (vaiTro === 'ChuyenGia') {
                khuVuc.style.display = 'block';
                document.getElementById('chuyenNganh').required = true;
                document.getElementById('coQuan').required = true;
            } else {
                khuVuc.style.display = 'none';
                document.getElementById('chuyenNganh').required = false;
                document.getElementById('coQuan').required = false;
                document.getElementById('fileBangCap').value = "";
                anhBangCapBase64 = "";
            }
        }

        // Hàm chuyển đổi file ảnh tải lên thành chuỗi Base64
        function chuyenAnhSangBase64(input) {
            const file = input.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert("Kích thước ảnh quá lớn. Vui lòng chọn ảnh dưới 5MB.");
                    input.value = ""; return;
                }
                const reader = new FileReader();
                reader.onload = function (e) {
                    anhBangCapBase64 = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        // Xử lý khi bấm nút Đăng ký
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const matKhau = document.getElementById('matKhau').value;
            const nhapLaiMatKhau = document.getElementById('nhapLaiMatKhau').value;
            if (matKhau !== nhapLaiMatKhau) {
                alert("Mật khẩu nhập lại không khớp. Vui lòng kiểm tra lại!");
                return;
            }

            const vaiTro = document.getElementById('vaiTro').value;

            if (vaiTro === 'ChuyenGia' && anhBangCapBase64 === "") {
                alert("Bạn phải tải lên Hình ảnh giấy tờ chứng minh / Bằng cấp để Admin xác duyệt!");
                return;
            }

            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            btnSubmit.disabled = true;

            // Đóng gói data chuẩn 100% khớp với Backend C#
            const req = {
                HoTen: document.getElementById('hoTen').value,
                TenDangNhap: document.getElementById('tenDangNhap').value,
                Email: document.getElementById('email').value,
                SoDienThoai: document.getElementById('soDienThoai').value,
                DiaChi: document.getElementById('diaChi').value,
                VaiTro: vaiTro,
                MatKhau: matKhau,
                ChuyenNganh: vaiTro === 'ChuyenGia' ? document.getElementById('chuyenNganh').value : null,
                CoQuan: vaiTro === 'ChuyenGia' ? document.getElementById('coQuan').value : null,
                AnhBangCap: anhBangCapBase64
            };

            try {
                const res = await fetch('/api/TaiKhoan/dang-ky', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(req)
                });
                const data = await res.json();

                if (res.ok) {
                    if (data.trangThaiDuyet === false) {
                        alert("Đăng ký thành công! Hồ sơ Chuyên gia của bạn đã được gửi cho Admin duyệt.");
                        window.location.href = '/dangnhap.html';
                    } else {
                        localStorage.setItem('hoTen_BenhLa', data.hoTen);
                        localStorage.setItem('vaiTro_BenhLa', data.vaiTro);
                        localStorage.setItem('id_BenhLa', data.id);
                        alert("Đăng ký thành công! Chào mừng bạn đến với hệ thống.");
                        window.location.href = '/nongdan.html';
                    }
                } else {
                    alert("Lỗi: " + data.message);
                    btnSubmit.innerHTML = 'Đăng ký ngay';
                    btnSubmit.disabled = false;
                }
            } catch (error) {
                alert("Lỗi kết nối mạng! Vui lòng kiểm tra lại server backend.");
                btnSubmit.innerHTML = 'Đăng ký ngay';
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
